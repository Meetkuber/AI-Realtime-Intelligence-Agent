name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend lint + type check ─────────────────────────────
  backend-check:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports (syntax)
        run: python -c "import backend.tools; import backend.agent; import backend.database; import backend.security; import backend.observability; print('✅ All imports OK')"

      - name: Run eval harness (text-only, no audio)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -m evals.run_evals --output evals/ci_results.json
        continue-on-error: true   # don't fail CI if Gemini API key not available in fork PRs

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: evals/ci_results.json

  # ── Frontend build ────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ── Docker build ──────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t aria-voice-agent:ci .

      - name: Smoke test container
        run: |
          docker run -d --name aria-test \
            -e GEMINI_API_KEY=dummy \
            -p 8001:8000 \
            aria-voice-agent:ci
          sleep 5
          curl -f http://localhost:8001/api/health || (echo "Curl failed! Printing container logs:" && docker logs aria-test && exit 1)
          docker stop aria-test
